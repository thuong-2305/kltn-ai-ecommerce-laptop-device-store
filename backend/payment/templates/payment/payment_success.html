{% extends 'base.html' %}
{% load humanize %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="text-center bg-white p-5 rounded shadow" style="max-width: 500px;">
        <div class="checkmark-circle mb-3">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
        </div>
        <h2 class="fw-bold mb-2">Cảm ơn bạn đã mua hàng!</h2>
        <p class="text-muted mb-1">
            Đơn hàng của bạn đã được ghi nhận thành công. 
        </p>
        <p class="text-muted mb-3">
            Chúng tôi sẽ gửi email xác nhận đơn hàng đến bạn trong thời gian sớm nhất.
        </p>
        <a href="{% url 'home' %}" class="btn btn-dark mt-3">Go to Homepage →</a>
    </div>
</div>

<script>
    window.onload = () => {
        confetti({
            particleCount: 150,
            spread: 100,
            origin: { y: 0.6 }
        });
    };
</script>

{% endblock %}
