{% load static %}

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Laptop Ecommerce</title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" href="{% static 'assets/favicon.ico' %}" />
        <!-- Fontawesome -->
        <link rel="stylesheet" href="{% static 'library/fontawesome-free-6.6.0-web/css/all.min.css' %}">
        <!-- Swiper -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css">
        <!-- Carousel -->
        <link href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css" rel="stylesheet">
        <link href="https://cdnjs.cloudflare.com/ajax/libs/ionicons/5.5.2/collection/components/icon/icon.min.css" rel="stylesheet">
        <!-- Bootstrap icons-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="{% static 'css/styles.css' %}?v={{ timestamp }}" rel="stylesheet" />
        <link rel="stylesheet" href="{% static 'css/style2.css' %}?v={{ timestamp }}">
        <link href="{% static 'css/ProductDetail.css' %}?v={{ timestamp }}" rel="stylesheet"/>
        <link rel="stylesheet" href="{% static 'css/cart.css' %}?v={{ timestamp }}">
        <link rel="stylesheet" href="{% static 'css/navbar.css' %}?v={{ timestamp }}">
        <link rel="stylesheet" href="{% static 'css/update_user.css' %}?v={{ timestamp }}">
        <link rel="stylesheet" href="{% static 'css/wishlist.css' %}?v={{ timestamp }}">
        <link rel="stylesheet" href="{% static 'css/payment.css' %}?v={{ timestamp }}">
        <link rel="stylesheet" href="{% static 'css/homediscount.css' %}?v={{ timestamp }}">
        <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
        <script 
            src="https://code.jquery.com/jquery-3.7.1.min.js" 
            integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" 
            crossorigin="anonymous">
        </script>
        <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    </head>
    <body>
        <!-- Navigation-->
        {% include 'navbar.html' %}

        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-warning alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
        <!-- Footer-->
        <footer class="py-5 bg-dark z-999">
            <div class="container"><p class="m-0 text-center text-white">Copyright &copy; weblaptop.com 2024</p></div>
        </footer>

        <!-- Notification -->
        <div id="notification2" class="notification2">
            <span id="notification-message"></span>
            <div class="progress-bar"></div>
        </div>
        
        <script>
            function showNotification(message, isSuccess) {
                var notification = $('#notification2');
                var messageElement = $('#notification-message');
                var progressBar = $('.progress-bar', notification);
        
                messageElement.text(message);
        
                if (isSuccess) {
                    notification.removeClass('error').addClass('show');
                } else {
                    notification.addClass('error').addClass('show');
                }
        
                progressBar.css('width', '0%');
            
                setTimeout(function() {
                    progressBar.css('width', '100%'); 
                }, 10);
        
                setTimeout(function() {
                    notification.removeClass('show');
                }, 1500);
            }
        
            $(document).on('click', '.like', function (e) {
                e.preventDefault();
                var button = $(this);   
                if(button.hasClass('active')) {
                    $.ajax({
                        type: 'POST',
                        url: '{% url "wishlist_remove" %}',
                        data: {
                            product_id: button.val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}',
                            action: 'post'
                        },
                        success: function (json) {
                            var isSuccess = true; 
                            var message = json.msg;             
                            showNotification(message, isSuccess);
                        },
                    });
                    
                    button.removeClass("active")
                    button.css({
                        "background-color": "#e8f4fb",  
                        "color": "#007bff"
                    });
                } else {
                    $.ajax({
                        type: 'POST',
                        url: '{% url "wishlist_add" %}',
                        data: {
                            product_id: button.val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}',
                            action: 'post'
                        },
                        success: function (json) {
                            var isSuccess = true; 
                            var message = json.msg;             
                            showNotification(message, isSuccess);
                        },
                    });
                    button.addClass("active")
                    button.css({
                        "background-color": "#f44336",  
                        "color": "#e8f4fb"
                    });
                }
            });
        </script>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.21.1/axios.min.js"></script>
        <!-- Swiper -->
        <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script src="{% static 'js/discount.js' %}"></script>
        <script src="{% static 'js/scripts.js' %}"></script>
    </body>
</html>
